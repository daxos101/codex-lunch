databases:
  - name: hagersten-lunch-db
    databaseName: lunch
    user: lunch
    plan: basic-256mb
    diskSizeGB: 15
    postgresMajorVersion: '16'
    region: frankfurt
    ipAllowList: []

services:
  - type: web
    name: hagersten-lunch-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    plan: starter
    region: frankfurt
    healthCheckPath: /health/ready
    preDeployCommand: node dist/migrate.js && node dist/seed.js
    autoDeployTrigger: checksPass
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hagersten-lunch-db
          property: connectionString
      - key: DATABASE_SSL
        value: disable
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: info

  - type: worker
    name: hagersten-lunch-worker
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    plan: starter
    region: frankfurt
    autoDeployTrigger: checksPass
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hagersten-lunch-db
          property: connectionString
      - key: DATABASE_SSL
        value: disable

  - type: web
    name: hagersten-lunch-web
    runtime: static
    autoDeployTrigger: checksPass
    buildCommand: corepack pnpm install --frozen-lockfile && corepack pnpm --filter @lunch/web build
    staticPublishPath: ./apps/web/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
