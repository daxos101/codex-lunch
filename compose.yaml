name: hagersten-lunch

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lunch
      POSTGRES_USER: lunch
      POSTGRES_PASSWORD: lunch
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lunch -d lunch']
      interval: 5s
      timeout: 3s
      retries: 15
    volumes:
      - lunch-postgres:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ['node', 'dist/migrate.js']
    environment:
      DATABASE_URL: postgresql://lunch:lunch@postgres:5432/lunch
      DATABASE_SSL: disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  seed:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ['node', 'dist/seed.js']
    environment:
      DATABASE_URL: postgresql://lunch:lunch@postgres:5432/lunch
      DATABASE_SSL: disable
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 3001
      CORS_ORIGINS: http://localhost:8080
      DATABASE_URL: postgresql://lunch:lunch@postgres:5432/lunch
      DATABASE_SSL: disable
      LOG_LEVEL: info
    ports:
      - '3001:3001'
    depends_on:
      seed:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3001/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://lunch:lunch@postgres:5432/lunch
      DATABASE_SSL: disable
    depends_on:
      seed:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: ''
    ports:
      - '8080:8080'
    depends_on:
      api:
        condition: service_healthy

volumes:
  lunch-postgres:
